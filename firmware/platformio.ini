; LoveLamp paired firmware — WEMOS ESP32 D1 Mini
;   pio run -t upload -t monitor
; Lamp A: pio run -e wemos_d1_mini32 -t upload
; Lamp B: pio run -e wemos_d1_mini32_B -t upload
; Copy src/secrets.h.example to src/secrets.h and add HiveMQ credentials.

[env]
platform = espressif32
board = wemos_d1_mini32
framework = arduino
monitor_speed = 115200
lib_deps =
    fastled/FastLED@^3.7.0
    tzapu/WiFiManager@^2.0.17
    knolleary/PubSubClient@^2.8
    bblanchon/ArduinoJson@^7.2.0

[env:wemos_d1_mini32]
build_flags = -DLAMP_ID=\"A\"

[env:wemos_d1_mini32_B]
build_flags = -DLAMP_ID=\"B\"
